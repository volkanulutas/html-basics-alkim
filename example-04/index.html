<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>Flex Layout Example</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>

<div class="logo">MySite</div>

<nav>

<a href="#">Home</a>
<a href="#">Products</a>
<a href="#">About</a>

</nav>

<div class="user">

Login

</div>

</header>


<div class="container">

<aside class="sidebar">

<h3>Menu</h3>

<ul>

<li>Dashboard</li>
<li>Profile</li>
<li>Settings</li>
<li>Logout</li>

</ul>

</aside>


<main class="main">

<div class="featured">

<h2>Featured Article</h2>

<p>Lorem ipsum dolor sit amet consectetur.</p>

</div>


<div class="card-grid">

<div class="card">Card 1</div>
<div class="card">Card 2</div>
<div class="card">Card 3</div>
<div class="card">Card 4</div>

</div>

</main>


<div class="info">

<h3>Info Panel</h3>

<ul>

<li>Users</li>
<li>Messages</li>
<li>Alerts</li>

</ul>

<div class="tip">

Tip: Check notifications regularly

</div>

</div>

</div>


<footer>

2026 Flex Layout Example

</footer>

</body>

</html>
